spring.config.activate.on-profile=prod

# Logging - Prod (padrão enxuto; controlável via APP_LOG_LEVEL)
logging.level.root=INFO
logging.level.com.modernbank.credit=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN

# Local de logs (usado pelo RollingFile no logback-spring.xml)
app.logs.path=logs
