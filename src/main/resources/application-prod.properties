spring.config.activate.on-profile=prod

# Logging - Prod (padrão enxuto; controlável via APP_LOG_LEVEL)
logging.level.root=DEBUG
logging.level.com.modernbank.credit=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN

# Local de logs (usado pelo RollingFile no logback-spring.xml)
app.logs.path=logs

# SQS
cloud.aws.sqs.queue-url=https://sqs.us-east-1.amazonaws.com/478966647597/propostas-mainframe-dev
cloud.aws.region.static=us-east-1