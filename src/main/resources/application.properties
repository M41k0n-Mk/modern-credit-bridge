spring.application.name=modern-credit-bridge

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (H2 para desenvolvimento)
spring.datasource.url=jdbc:h2:mem:creditdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (apenas para desenvolvimento)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.root=INFO
logging.level.com.modernbank.credit=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Validation
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# AWS

# Neptune (configure via variável de ambiente NEPTUNE_ENDPOINT; default apontado para localhost)
neptune.endpoint=${NEPTUNE_ENDPOINT:localhost}

# SQS (configure via variável de ambiente SQS_QUEUE_URL)
aws.sqs.queue.url=${SQS_QUEUE_URL:http://localhost:9324/queue/dev}
cloud.aws.region.static=${AWS_REGION:us-east-1}